<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Inn ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6e7,#fff0f6);
    overflow:hidden;
}

/* HALAMAN 1 */
#page1{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

#page1 h1{
    color:#ff4f8b;
    font-size:3rem;
    margin-bottom:10px;
}

#page1 h2{
    color:#ff6b9d;
}

#page1 p{
    margin-top:15px;
    color:#666;
}

#openGift{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff6b9d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* HALAMAN 2 */
#page2{
    display:none;
    min-height:100vh;
    padding:40px 20px;
    text-align:center;
}

.slider{
    display:flex;
    justify-content:center;
}

.hero-photo{
    width:300px;
    height:300px;
    object-fit:cover;
    border-radius:20px;
    border:8px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:1s;
}

h3{
    margin-top:25px;
    color:#ff4f8b;
    font-size:2rem;
}

#message{
    max-width:700px;
    margin:25px auto;
    color:#555;
    line-height:1.8;
    font-size:18px;
}

.dots{
    margin-top:15px;
}

.dot{
    height:10px;
    width:10px;
    background:#ff9fc0;
    border-radius:50%;
    display:inline-block;
    margin:0 3px;
}

.active{
    background:#ff4f8b;
}

footer{
    margin-top:40px;
    color:#ff4f8b;
    font-weight:bold;
    font-size:20px;
}

/* hati animasi */
.heart{
    position:fixed;
    bottom:-20px;
    color:#ff77a9;
    animation:float 8s linear infinite;
    opacity:0.6;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<!-- HALAMAN 1 -->
<section id="page1">

    <h1>💖 Happiest Birthday 💖</h1>

    <h2>Indah Trisdayanti Nazara</h2>

    <p>Untuk seseorang yang sangat spesial ❤️</p>

    <button id="openGift">
        🎁 Buka Hadiah
    </button>

</section>

<!-- HALAMAN 2 -->
<section id="page2">

    <div class="slider">
        <img id="slideImage"
             src="images/foto1.jpg"
             class="hero-photo">
    </div>

    <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <h3>Happy Birthday Inn ❤️</h3>

    <div id="message"></div>

    <footer>
        💕 Love, Ann 💕
    </footer>

</section>

<!-- MUSIK -->
<audio id="music" loop>
    <source src="music/romantic.mp3" type="audio/mpeg">
</audio>

<script>

/* buka hadiah */
document.getElementById("openGift").addEventListener("click",()=>{

    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";

    document.body.style.overflow="auto";

    document.getElementById("music").play();

    typeWriter();
});

/* pesan */
const text =
"Selamat ulang tahun Inn ❤️. Semoga di usia yang baru ini kamu selalu diberikan kesehatan, kebahagiaan, rezeki yang berlimpah, dan segala hal baik yang kamu impikan. Terima kasih untuk selalu jadi orang baik. Kado nya sudah aku kirim duluan, di pakai dengan baik ya.. satu kado lagi masih menyusul di perjalanan, di tunggu ya hehe.. 🎂💖";

let i = 0;

function typeWriter(){

    if(i < text.length){

        document.getElementById("message").innerHTML += text.charAt(i);

        i++;

        setTimeout(typeWriter,40);
    }
}

/* slider 7 foto */

const photos = [
"images/foto1.jpg",
"images/foto2.jpg",
"images/foto3.jpg",
"images/foto4.jpg",
"images/foto5.jpg",
"images/foto6.jpg",
"images/foto7.jpg"
];

let current = 0;

const dots = document.querySelectorAll(".dot");

function changePhoto(){

    const img = document.getElementById("slideImage");

    img.style.opacity = 0;

    setTimeout(()=>{

        current++;

        if(current >= photos.length){
            current = 0;
        }

        img.src = photos[current];

        dots.forEach(dot=>dot.classList.remove("active"));
        dots[current].classList.add("active");

        img.style.opacity = 1;

    },500);
}

setInterval(changePhoto,3000);

/* animasi hati */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💖";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize =
    (Math.random()*20+15)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
